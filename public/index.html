<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>DrMax - Sistem de Programări</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary: #0d7377;
        --primary-light: #14919b;
        --primary-dark: #0a5a62;
        --accent: #ffd60a;
        --success: #06d6a0;
        --danger: #ef476f;
        --background: #f8f9fa;
        --surface: #ffffff;
        --foreground: #1a1a1a;
        --text-secondary: #666666;
        --border: #e0e0e0;
        --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
        --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.12);
        --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.15);
      }

      body {
        font-family: 'Poppins', sans-serif;
        background-color: var(--background);
        color: var(--foreground);
        line-height: 1.6;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 1rem;
      }

      /* Header - Premium Design */
      .header {
        background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
        padding: 3rem 1rem;
        text-align: center;
        color: white;
        position: relative;
        overflow: hidden;
      }

      .header::before {
        content: '';
        position: absolute;
        top: -50%;
        right: -10%;
        width: 400px;
        height: 400px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 50%;
      }

      .header::after {
        content: '';
        position: absolute;
        bottom: -30%;
        left: -5%;
        width: 300px;
        height: 300px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 50%;
      }

      .header-content {
        position: relative;
        z-index: 1;
      }

      .header h1 {
        font-size: 3rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
        letter-spacing: -0.5px;
      }

      .header p {
        font-size: 1rem;
        opacity: 0.9;
        font-weight: 300;
      }

      /* Buttons */
      .button {
        background-color: var(--primary);
        color: white;
        border: none;
        padding: 0.875rem 1.75rem;
        border-radius: 0.75rem;
        cursor: pointer;
        font-size: 1rem;
        font-weight: 600;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: var(--shadow-sm);
        font-family: 'Poppins', sans-serif;
      }

      .button:hover {
        background-color: var(--primary-dark);
        transform: translateY(-2px);
        box-shadow: var(--shadow-md);
      }

      .button:active {
        transform: scale(0.98);
      }

      .button-danger {
        background-color: var(--danger);
      }

      .button-danger:hover {
        background-color: #e63a5a;
        box-shadow: var(--shadow-md);
      }

      .button-group {
        display: flex;
        gap: 1rem;
        margin-bottom: 2.5rem;
        flex-wrap: wrap;
      }

      /* Modal */
      .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        animation: fadeIn 0.3s ease;
        backdrop-filter: blur(4px);
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      .modal.active {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .modal-content {
        background-color: var(--surface);
        padding: 2.5rem;
        border-radius: 1.25rem;
        width: 90%;
        max-width: 550px;
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: var(--shadow-lg);
        animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      @keyframes slideUp {
        from {
          transform: translateY(50px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
        border-bottom: 2px solid var(--background);
        padding-bottom: 1rem;
      }

      .modal-header h2 {
        font-size: 1.75rem;
        color: var(--foreground);
        font-weight: 700;
      }

      .close-btn {
        background: none;
        border: none;
        font-size: 2rem;
        cursor: pointer;
        color: var(--text-secondary);
        transition: all 0.2s ease;
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
      }

      .close-btn:hover {
        background-color: var(--background);
        color: var(--foreground);
      }

      /* Form */
      .form-group {
        margin-bottom: 1.5rem;
      }

      .form-group label {
        display: block;
        margin-bottom: 0.75rem;
        font-weight: 600;
        color: var(--foreground);
        font-size: 0.95rem;
      }

      .form-group input,
      .form-group select,
      .form-group textarea {
        width: 100%;
        padding: 0.875rem;
        border: 2px solid var(--border);
        border-radius: 0.75rem;
        font-family: 'Poppins', sans-serif;
        font-size: 1rem;
        transition: all 0.3s ease;
        background-color: var(--background);
      }

      .form-group textarea {
        resize: vertical;
        min-height: 120px;
      }

      .form-group input:focus,
      .form-group select:focus,
      .form-group textarea:focus {
        outline: none;
        border-color: var(--primary);
        background-color: var(--surface);
        box-shadow: 0 0 0 4px rgba(13, 115, 119, 0.1);
      }

      /* Appointments List */
      .appointments-list {
        display: grid;
        gap: 1.25rem;
      }

      .appointment-card {
        background-color: var(--surface);
        border: 1px solid var(--border);
        border-radius: 1rem;
        padding: 1.75rem;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 1.5rem;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: var(--shadow-sm);
      }

      .appointment-card:hover {
        box-shadow: var(--shadow-md);
        transform: translateY(-2px);
        border-color: var(--primary);
      }

      .appointment-info {
        flex: 1;
      }

      .appointment-name {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--foreground);
        margin-bottom: 0.75rem;
      }

      .appointment-detail {
        font-size: 0.95rem;
        color: var(--text-secondary);
        margin-bottom: 0.5rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .appointment-actions {
        display: flex;
        gap: 0.75rem;
      }

      .delete-btn {
        background-color: var(--danger);
        color: white;
        border: none;
        padding: 0.625rem 1.25rem;
        border-radius: 0.75rem;
        cursor: pointer;
        font-size: 0.9rem;
        font-weight: 600;
        transition: all 0.3s ease;
        box-shadow: var(--shadow-sm);
        font-family: 'Poppins', sans-serif;
      }

      .delete-btn:hover {
        background-color: #e63a5a;
        box-shadow: var(--shadow-md);
        transform: translateY(-2px);
      }

      /* Empty State */
      .empty-state {
        text-align: center;
        padding: 4rem 2rem;
        color: var(--text-secondary);
      }

      .empty-state-icon {
        font-size: 3.5rem;
        margin-bottom: 1rem;
        opacity: 0.5;
      }

      .empty-state p {
        font-size: 1.1rem;
        margin-bottom: 0.5rem;
        font-weight: 500;
      }

      .empty-state p:last-child {
        font-size: 0.95rem;
        opacity: 0.8;
      }

      /* Loading */
      .loading {
        text-align: center;
        padding: 3rem 2rem;
        color: var(--text-secondary);
      }

      .loading::after {
        content: '';
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid var(--border);
        border-top-color: var(--primary);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-left: 0.5rem;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* Toast */
      .toast {
        position: fixed;
        bottom: 1.5rem;
        right: 1.5rem;
        padding: 1rem 1.5rem;
        border-radius: 0.75rem;
        color: white;
        font-weight: 600;
        animation: slideInUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 2000;
        box-shadow: var(--shadow-lg);
        font-size: 0.95rem;
      }

      @keyframes slideInUp {
        from {
          transform: translateY(100px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .toast.success {
        background-color: var(--success);
      }

      .toast.error {
        background-color: var(--danger);
      }

      /* Responsive */
      @media (max-width: 768px) {
        .header {
          padding: 2rem 1rem;
        }

        .header h1 {
          font-size: 2rem;
        }

        .header p {
          font-size: 0.9rem;
        }

        .appointment-card {
          flex-direction: column;
          padding: 1.25rem;
        }

        .button-group {
          flex-direction: column;
        }

        .button {
          width: 100%;
        }

        .modal-content {
          padding: 1.5rem;
          width: 95%;
        }

        .modal-header h2 {
          font-size: 1.5rem;
        }

        .toast {
          bottom: 1rem;
          right: 1rem;
          left: 1rem;
          width: auto;
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="header-content">
        <h1>DrMax</h1>
        <p>Sistem de gestionare a programărilor - doctor 2</p>
      </div>
    </div>

    <div class="container">
      <div class="button-group">
        <button class="button" onclick="openModal()">+ Adaugă Programare</button>
        <button class="button button-danger" onclick="deleteAll()">Șterge Toate</button>
      </div>

      <div id="appointmentsList" class="appointments-list">
        <div class="loading">Se încarcă...</div>
      </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Adaugă Programare</h2>
          <button class="close-btn" onclick="closeModal()">×</button>
        </div>

        <form id="appointmentForm" onsubmit="handleSubmit(event)">
          <div class="form-group">
            <label for="nume">Nume Pacient</label>
            <input type="text" id="nume" name="nume" required />
          </div>

          <div class="form-group">
            <label for="nrTelefon">Telefon</label>
            <input type="tel" id="nrTelefon" name="nrTelefon" placeholder="Ex: 40790 342 380" required />
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required />
          </div>

          <div class="form-group">
            <label for="data">Data Programării</label>
            <input type="date" id="data" name="data" required />
          </div>

          <div class="form-group">
            <label for="oraProgramarii">Ora Programării</label>
            <input type="time" id="oraProgramarii" name="oraProgramarii" required />
          </div>

          <div class="form-group">
            <label for="tipProgramare">Tip Programare</label>
            <select id="tipProgramare" name="tipProgramare" required>
              <option value="">Selectați tipul</option>
              <option value="Curățare dentară">Curățare dentară</option>
              <option value="Examinare generală">Examinare generală</option>
              <option value="Tratament carie">Tratament carie</option>
              <option value="Detartraj">Detartraj</option>
              <option value="Albire dentară">Albire dentară</option>
              <option value="Implant dentar">Implant dentar</option>
              <option value="Altele">Altele</option>
            </select>
          </div>

          <div class="form-group">
            <label for="notite">Note Speciale</label>
            <textarea id="notite" name="notite"></textarea>
          </div>

          <button type="submit" class="button" style="width: 100%;">Adaugă Programare</button>
        </form>
      </div>
    </div>

    <script>
      const API_URL = '/api';

      function openModal() {
        document.getElementById('modal').classList.add('active');
      }

      function closeModal() {
        document.getElementById('modal').classList.remove('active');
        document.getElementById('appointmentForm').reset();
      }

      function showToast(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.textContent = message;
        document.body.appendChild(toast);

        setTimeout(() => {
          toast.remove();
        }, 3000);
      }

      async function handleSubmit(event) {
        event.preventDefault();

        const formData = new FormData(event.target);
        const data = Object.fromEntries(formData);

        // Convert date format from YYYY-MM-DD to DD.MM.YYYY
        const [year, month, day] = data.data.split('-');
        data.data = `${day}.${month}.${year}`;

        try {
          const response = await fetch(`${API_URL}/appointments`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify(data),
          });

          if (!response.ok) {
            throw new Error('Failed to add appointment');
          }

          showToast('Programare adăugată și salvată în Google Sheets!', 'success');
          closeModal();
          loadAppointments();
        } catch (error) {
          console.error('Error:', error);
          showToast('Eroare la adăugarea programării', 'error');
        }
      }

      async function loadAppointments() {
        try {
          const response = await fetch(`${API_URL}/appointments`);
          if (!response.ok) {
            throw new Error('Failed to load appointments');
          }

          const appointments = await response.json();
          const container = document.getElementById('appointmentsList');

          if (appointments.length === 0) {
            container.innerHTML = `
              <div class="empty-state">
                <div class="empty-state-icon">📅</div>
                <p>Nu sunt programări adăugate încă</p>
                <p>Apăsați butonul de mai sus pentru a adăuga o programare</p>
              </div>
            `;
            return;
          }

          container.innerHTML = appointments
            .map(
              (apt) => `
            <div class="appointment-card">
              <div class="appointment-info">
                <div class="appointment-name">${apt.nume}</div>
                <div class="appointment-detail">📞 ${apt.nrTelefon}</div>
                <div class="appointment-detail">📧 ${apt.email}</div>
                <div class="appointment-detail">📅 ${apt.data} la ${apt.oraProgramarii}</div>
                <div class="appointment-detail">🏥 ${apt.tipProgramare}</div>
                ${apt.notite ? `<div class="appointment-detail">📝 ${apt.notite}</div>` : ''}
              </div>
              <div class="appointment-actions">
                <button class="delete-btn" onclick="deleteAppointment('${apt.id}')">Șterge</button>
              </div>
            </div>
          `
            )
            .join('');
        } catch (error) {
          console.error('Error loading appointments:', error);
          document.getElementById('appointmentsList').innerHTML =
            '<div class="empty-state"><p>Eroare la încărcarea programărilor</p></div>';
        }
      }

      async function deleteAppointment(id) {
        if (!confirm('Sunteți sigur că doriți să ștergeți această programare?')) {
          return;
        }

        try {
          const response = await fetch(`${API_URL}/appointments/${id}`, {
            method: 'DELETE',
          });

          if (!response.ok) {
            throw new Error('Failed to delete appointment');
          }

          showToast('Programare ștearsă', 'success');
          loadAppointments();
        } catch (error) {
          console.error('Error:', error);
          showToast('Eroare la ștergerea programării', 'error');
        }
      }

      async function deleteAll() {
        if (!confirm('Sunteți sigur că doriți să ștergeți TOATE programările?')) {
          return;
        }

        try {
          const response = await fetch(`${API_URL}/appointments`, {
            method: 'DELETE',
          });

          if (!response.ok) {
            throw new Error('Failed to delete all appointments');
          }

          showToast('Toate programările au fost șterse', 'success');
          loadAppointments();
        } catch (error) {
          console.error('Error:', error);
          showToast('Eroare la ștergerea programărilor', 'error');
        }
      }

      // Load appointments on page load
      loadAppointments();

      // Close modal when clicking outside
      window.onclick = function (event) {
        const modal = document.getElementById('modal');
        if (event.target === modal) {
          closeModal();
        }
      };
    </script>
  </body>
</html>
